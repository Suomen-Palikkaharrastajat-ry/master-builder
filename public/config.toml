# Site-wide configuration for Suomen Palikkaharrastajat ry
# Edit this file to update branding, navigation, and footer content.

[site]
title       = "Suomen Palikkaharrastajat ry"
description = "Suomen LEGO-harrastajien yhteisö"
url         = "https://palikkaharrastajat.fi"

[branding]
# Horizontal logo paths — light variant for dark surfaces, dark variant for light surfaces.
logo_light = "/logo/horizontal/svg/horizontal-full.svg"
logo_dark  = "/logo/horizontal/svg/horizontal-full-dark-bold.svg"
logo_alt   = "Suomen Palikkaharrastajat ry"

[navbar]
# Set to true to make the navbar sticky (fixed at top of viewport on mobile).
sticky = true

[footer]
# Square logo shown in the footer.
logo        = "/logo/square/svg/square-smile-full-dark-bold.svg"
# Label rendered above the footer link list (typically the organisation name).
site_label  = "Suomen Palikkaharrastajat ry"
copyright   = "© 2026 Suomen Palikkaharrastajat ry"
disclaimer  = "LEGO® on LEGO Groupin rekisteröity tavaramerkki"

[[footer.links]]
label = "Jäsenfoorumi"
href  = "https://forum.palikkaharrastajat.fi"

[[footer.links]]
label = "Jäsenkortti"
href  = "https://kortti.palikkaharrastajat.fi"

[[footer.links]]
label = "Jäsenmaksu"
href  = "https://maksut.palikkaharrastajat.fi"

[[footer.links]]
label = "Palikkakalenteri"
href  = "https://kalenteri.palikkaharrastajat.fi"

[[footer.links]]
label = "Palikkalinkit"
href  = "https://linkit.palikkaharrastajat.fi"
